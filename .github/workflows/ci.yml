name: CI

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "packages/**"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm turbo build
