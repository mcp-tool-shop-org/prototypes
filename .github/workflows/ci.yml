name: CI

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "packages/**"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - run: corepack enable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - run: echo "Archived monorepo — CI validates checkout and structure only"
      - run: test -f pnpm-workspace.yaml && test -f turbo.json && echo "Structure valid"
