name: Weekly Drift Report

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run unit tests
        run: npm test

      - name: Detect drift (dry run)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node src/index.mjs --dry-run --config sync.config.json

      - name: Show plan summary
        if: always()
        run: |
          PLAN=$(find reports -name plan.md -type f 2>/dev/null | head -1)
          if [ -n "$PLAN" ]; then
            echo "## Drift Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat "$PLAN" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No drift report generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_number }}
          path: reports/
          retention-days: 30
