name: Apply Drift Fixes

on:
  workflow_dispatch:
    inputs:
      target_slug:
        description: 'Target slug to apply (blank = all enabled targets)'
        required: false
        default: ''
      dry_run_first:
        description: 'Run dry-run before applying (recommended)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      has_drift: ${{ steps.detect.outputs.has_drift }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run unit tests
        run: npm test

      - name: Detect drift (dry run)
        id: detect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--dry-run --config sync.config.json"
          if [ -n "${{ inputs.target_slug }}" ]; then
            ARGS="$ARGS --target ${{ inputs.target_slug }}"
          fi
          node src/index.mjs $ARGS

          PLAN=$(find reports -name plan.json -type f 2>/dev/null | head -1)
          if [ -n "$PLAN" ]; then
            DRIFTS=$(node -e "const p=JSON.parse(require('fs').readFileSync('$PLAN','utf8'));console.log(p.totalDrifts)")
            echo "has_drift=$([ "$DRIFTS" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          else
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Show plan summary
        if: always()
        run: |
          PLAN=$(find reports -name plan.md -type f 2>/dev/null | head -1)
          if [ -n "$PLAN" ]; then
            echo "## Drift Plan (pre-apply)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat "$PLAN" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No drift detected. Nothing to apply." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload pre-apply report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-apply-report-${{ github.run_number }}
          path: reports/
          retention-days: 30

  apply:
    needs: plan
    if: needs.plan.outputs.has_drift == 'true'
    runs-on: ubuntu-latest
    environment: link-fresh-apply
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply drift fixes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--apply --config sync.config.json"
          if [ -n "${{ inputs.target_slug }}" ]; then
            ARGS="$ARGS --target ${{ inputs.target_slug }}"
          fi
          node src/index.mjs $ARGS

      - name: Show results summary
        if: always()
        run: |
          RESULTS=$(find reports -name results.json -type f 2>/dev/null | head -1)
          if [ -n "$RESULTS" ]; then
            echo "## Apply Results" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const r = JSON.parse(require('fs').readFileSync('$RESULTS','utf8'));
              const applied = r.actions.filter(a => a.status === 'applied').length;
              const failed = r.actions.filter(a => a.status === 'failed').length;
              console.log('| Metric | Count |');
              console.log('|--------|-------|');
              console.log('| Applied | ' + applied + ' |');
              console.log('| Failed | ' + failed + ' |');
              console.log('| Total | ' + r.actions.length + ' |');
            " >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload apply results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apply-results-${{ github.run_number }}
          path: reports/
          retention-days: 30
